<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAHİSONLİNE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">BAHİSONLİNE</div>
        <nav>
            <ul>
                <li><a href="#">Ana Sayfa</a></li>
                <li><a href="#">Hakkımızda</a></li>
                <li><a href="#">İletişim</a></li>
            </ul>
        </nav>
    </header>

        <div class="login-box">
            <h2>Üye Girişi</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" required placeholder="Kullanıcı adınızı girin">
                </div>
                
                <div class="input-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" required placeholder="Şifrenizi girin">
                </div>
                
                <div id="error-message" class="error-text"></div>
                
                <button type="submit" class="btn-login">Giriş Yap</button>
            </form>
        </div>
    </div> <!-- hero-content kapanışı -->
</section> <!-- hero kapanışı -->
