<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahis Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            
            <!-- Logonuz -->
            <div class="logo-container">
                <img src="resim.png" alt="Logo" class="site-logo">
            </div>

            <!-- Giriş Kutunuz -->
            <div class="login-box">
                <h2>Üye Girişi</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Kullanıcı Adı</label>
                        <input type="text" id="username" required placeholder="Kullanıcı adınızı girin">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Şifre</label>
                        <input type="password" id="password" required placeholder="Şifrenizi girin">
                    </div>
                    
                    <!-- Hata mesajının çıkacağı alan -->
                    <div id="error-message" class="error-text"></div>
                    
                    <button type="submit" class="btn-login">Giriş Yap</button>
                </form>
            </div>

        </div> <!-- hero-content sonu -->
    </section> <!-- hero sonu -->

    <script src="script.js"></script>
</body>
</html>
